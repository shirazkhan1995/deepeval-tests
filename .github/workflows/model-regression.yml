name: Model Regression Check

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      update_baseline:
        description: 'Promote current scores to new baseline (true/false)'
        required: false
        default: 'false'

jobs:
  regression-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run regression check
        id: regression
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          REGRESSION_TOLERANCE: '0.05'
          DEEPEVAL_TELEMETRY_OPT_OUT: 'YES'
        working-directory: scripts
        run: python regression_check.py

      - name: Write regression diff to Step Summary
        if: always()
        run: cat reports/regression_diff.md >> $GITHUB_STEP_SUMMARY

      - name: Upload regression diff artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-diff-${{ github.run_number }}
          path: reports/regression_diff.json
          retention-days: 30

      - name: Update baseline (manual trigger only)
        if: >
          github.event_name == 'workflow_dispatch' &&
          github.event.inputs.update_baseline == 'true'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DEEPEVAL_TELEMETRY_OPT_OUT: 'YES'
        working-directory: scripts
        run: python update_baseline.py

      - name: Commit updated baseline
        if: >
          github.event_name == 'workflow_dispatch' &&
          github.event.inputs.update_baseline == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add baselines/scores.json
          git commit -m "chore: update regression baseline [skip ci]"
          git push
